<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor - College Buddy AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card" style="max-width: 400px; text-align: center;">
        <h1>💼 Placement Predictor</h1>
        <p>Estimate your placement success probability based on CGPA.</p>

        <form action="/placement_result" method="POST" style="text-align: left;">
            <label for="cgpa">Enter your CGPA</label>
            <input type="number" step="0.01" min="0" max="10" name="cgpa" id="cgpa" placeholder="CGPA (e.g. 8.5)" required>

            <button type="submit" style="margin-top: 15px;">Predict Placement Chance</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px; margin-bottom: 0;">
            <a href="/dashboard">⬅ Back to Dashboard</a>
        </p>
    </div>
</body>
</html>
